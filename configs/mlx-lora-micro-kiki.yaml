# micro-kiki MLX LoRA config
model: models/qwen3.5-35b-a3b
fine_tune_type: lora

lora_parameters:
  rank: 16
  alpha: 32
  dropout: 0.0
  scale: 2.0
  keys:
    - self_attn.q_proj
    - self_attn.k_proj
    - self_attn.v_proj
    - self_attn.o_proj

num_layers: 40
learning_rate: 5e-5
lr_schedule:
  name: cosine_decay
  warmup: 50
  arguments:
    - 500
    - 1.0e-6

batch_size: 1
grad_accumulation_steps: 4
iters: 500
max_seq_length: 4096
grad_checkpoint: true

save_every: 100
steps_per_report: 10
steps_per_eval: 100
val_batches: 25

train: true
seed: 42
